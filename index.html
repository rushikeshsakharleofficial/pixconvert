<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixConvert — Free Browser-Side Image Converter</title>
  <meta name="description" content="Convert images instantly in your browser. Free, private, no uploads. Support for PNG, JPG, WebP, BMP, AVIF, HEIC, HEIF and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- React Router 6 from cdnjs to avoid unpkg CORS redirect issues -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-router-dom/6.22.3/react-router-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

  <!-- Components (order matters: dependencies first) -->
  <script type="text/babel" data-presets="react" src="src/components/DropZone.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Navbar.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Home.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/UniversalConverter.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/GifMaker.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/StickerMaker.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Tools.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/About.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Privacy.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Contact.jsx"></script>
  <script type="text/babel" data-presets="react" src="src/components/Footer.jsx"></script>

  <!-- Main App (must load last) -->
  <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
</body>
</html>
